name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install ESLint globally
        run: npm install -g eslint

      - name: Run linter
        run: eslint .

      - name: Run tests
        run: npx jest --passWithNoTests

      - name: Build
        run: echo "Build complete"

      - name: Deploy message
        run: echo "All checks passed! Ready to deploy."